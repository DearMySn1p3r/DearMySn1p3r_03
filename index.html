<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니멀 청첩장 메이커</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Nanum+Myeongjo:wght@400;700&family=Noto+Serif+KR:wght@300;400;700&family=Gowun+Batang&family=Pinyon+Script&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* 🎨 테마별 CSS 변수 (기존과 동일) */
        body.theme-classic {
            --body-bg: #f5f3ef;
            --card-bg: radial-gradient(circle at center, #ffffff 0%, #fdfbf7 100%);
            --text-main: #4a433b;
            --text-muted: #888888;
            --line-color: #e6d5a7;
            --accent: #bba58e; 
            --petal-color: #ffffff;
            --card-shadow: rgba(187, 165, 142, 0.15);
        }

        body.theme-blossom {
            --body-bg: #fcf5f7;
            --card-bg: radial-gradient(circle at center, #ffffff 0%, #fff0f3 100%);
            --text-main: #5a3c43;
            --text-muted: #a88d92;
            --line-color: #f0b9c5;
            --accent: #dcaeb6;
            --petal-color: #ffb6c1;
            --card-shadow: rgba(220, 174, 182, 0.2);
        }

        body.theme-night {
            --body-bg: #0d1117;
            --card-bg: radial-gradient(circle at center, #1c212b 0%, #0d1117 100%);
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --line-color: #4a5668;
            --accent: #a4b5d0;
            --petal-color: #a4b5d0;
            --card-shadow: rgba(0, 0, 0, 0.6);
        }

        body {
            background: var(--body-bg);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* 🌸 배경 흩날리는 효과 */
        .petal {
            position: absolute;
            width: 6px; height: 6px;
            background: var(--petal-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--petal-color);
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            filter: blur(1px);
        }

        /* 3D 원근감을 위한 래퍼 */
        .card-perspective-wrapper {
            perspective: 1200px;
            padding: 20px;
            z-index: 10;
        }

        /* 둥둥 떠다니는 애니메이션 */
        .card-wrapper {
            animation: floatCard 8s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); }
            50% { transform: translateY(10px); }
            100% { transform: translateY(0px); }
        }

        /* 💌 메인 청첩장 카드 */
        .holy-card {
            position: relative;
            width: 650px;
            height: 650px;
            background: var(--card-bg);
            box-shadow: 0 20px 50px var(--card-shadow);
            padding: 60px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 2px;
            transition: transform 0.1s ease-out, background 0.8s ease, box-shadow 0.8s ease;
            transform-style: preserve-3d;
        }

        /* 🖼️ [핵심 수정] 캡처 전용 테두리 레이어 */
        .decoration-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1; /* 텍스트보다 아래, 워터마크보다 위 */
        }

        /* 배경 필기체 워터마크 */
        .bg-script {
            position: absolute;
            top: 55%; left: 50%;
            transform: translate(-50%, -50%) rotate(-10deg);
            font-family: 'Pinyon Script', cursive;
            font-size: 140px;
            color: var(--accent);
            opacity: 0.05;
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
            transition: color 0.8s ease;
        }

        /* ✍️ 에디터 영역 */
        .editor-area {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 90%;
            outline: none;
            font-family: 'Noto Serif KR', serif;
            text-align: center;
            cursor: text;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            caret-color: transparent;
            /* overflow-y: auto 제거 -> 캡처 시 스크롤바 방지 */
        }

        /* 중앙 텍스트 레이아웃 */
        .invite-intro {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 0.3em;
            color: var(--accent);
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        
        .invite-names {
            font-family: 'Pinyon Script', cursive;
            font-size: 4.5rem;
            line-height: 1.1;
            color: var(--text-main);
            margin: 0 0 30px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.02);
            padding: 0 20px;
        }

        .invite-datetime {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            color: var(--text-main);
            margin-bottom: 25px;
            border-bottom: 1px solid var(--line-color);
            padding-bottom: 20px;
            display: inline-block;
        }

        .invite-location {
            font-family: 'Noto Serif KR', serif;
            font-size: 1rem;
            line-height: 1.8;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 35px;
        }

        .invite-outro {
            font-family: 'Noto Serif KR', serif;
            font-style: italic;
            font-size: 0.95rem;
            color: var(--accent);
            letter-spacing: 0.02em;
        }

        /* --- UI 요소들 --- */
        .toolbar {
            position: absolute; top: -70px; left: 50%;
            transform: translateX(-50%);
            display: flex; align-items: center; gap: 12px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 8px; border: 1px solid #eee;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            z-index: 100; transition: opacity 0.3s ease; white-space: nowrap;
        }
        .toolbar select { background: transparent; border: none; font-size: 0.85rem; cursor: pointer; color: #333; }
        .toolbar button { background: transparent; border: none; color: #666; font-size: 0.85rem; cursor: pointer; padding: 4px; }
        .divider { width: 1px; height: 14px; background: #ddd; }
        .color-btn { width: 16px; height: 16px; border-radius: 50%; border: 1px solid #ddd; display: inline-block; cursor: pointer; }
        .bottom-ui { position: fixed; bottom: 30px; display: flex; align-items: center; gap: 20px; z-index: 100; }
        .theme-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.85rem; }
        .toggle-ui-btn { position: fixed; top: 30px; right: 40px; background: transparent; border: 1px solid var(--line-color); color: var(--text-muted); padding: 6px 14px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; z-index: 100; }

    </style>
</head>
<body class="theme-classic">

    <button class="toggle-ui-btn" id="toggle-ui-btn" onclick="toggleUI()" data-html2canvas-ignore="true">Hide UI</button>

    <div class="card-perspective-wrapper">
        <div class="card-wrapper" id="card-wrapper">
            
            <div class="toolbar" id="main-toolbar" data-html2canvas-ignore="true">
                <select onchange="changeFont(this.value)">
                    <option value="'Noto Serif KR', serif">본명조</option>
                    <option value="'Nanum Myeongjo', serif">나눔 명조</option>
                    <option value="'Pinyon Script', cursive">필기체 (영문)</option>
                    <option value="'Cinzel', serif">클래식 (영문)</option>
                </select>
                <span class="divider"></span>
                <button onmousedown="event.preventDefault(); formatText('bold')"><b>B</b></button>
                <button onmousedown="event.preventDefault(); formatText('italic')"><i>I</i></button>
                <button onmousedown="event.preventDefault(); formatText('underline')"><u>U</u></button>
                <span class="divider"></span>
                <span class="color-btn" style="background: #4a433b;" onmousedown="event.preventDefault(); formatText('foreColor', '#4a433b')"></span>
                <span class="color-btn" style="background: #bba58e;" onmousedown="event.preventDefault(); formatText('foreColor', '#bba58e')"></span>
                <span class="color-btn" style="background: #dcaeb6;" onmousedown="event.preventDefault(); formatText('foreColor', '#dcaeb6')"></span>
                <span class="color-btn" style="background: #a4b5d0;" onmousedown="event.preventDefault(); formatText('foreColor', '#a4b5d0')"></span>
                <span class="divider"></span>
                <button style="color: #bba58e; font-weight: 500;" onclick="saveImage()">저장하기</button>
            </div>

            <div class="holy-card" id="invite-card">
                
                <svg class="decoration-layer" viewBox="0 0 650 650" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="20" y="20" width="610" height="610" stroke="var(--line-color)" stroke-width="1"/>
                    
                    <rect x="28" y="28" width="594" height="594" stroke="var(--line-color)" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
                    
                    <g transform="translate(20, 20)" stroke="var(--accent)" stroke-width="1.5">
                        <path d="M 0 50 Q 0 0 50 0 Q 30 15 15 30 Q 0 50 0 50" fill="none" stroke-linecap="round"/>
                        <circle cx="15" cy="15" r="2" fill="var(--accent)"/>
                    </g>
                    
                    <g transform="translate(630, 20) scale(-1, 1)" stroke="var(--accent)" stroke-width="1.5">
                        <path d="M 0 50 Q 0 0 50 0 Q 30 15 15 30 Q 0 50 0 50" fill="none" stroke-linecap="round"/>
                        <circle cx="15" cy="15" r="2" fill="var(--accent)"/>
                    </g>
                    
                    <g transform="translate(20, 630) scale(1, -1)" stroke="var(--accent)" stroke-width="1.5">
                        <path d="M 0 50 Q 0 0 50 0 Q 30 15 15 30 Q 0 50 0 50" fill="none" stroke-linecap="round"/>
                        <circle cx="15" cy="15" r="2" fill="var(--accent)"/>
                    </g>
                    
                    <g transform="translate(630, 630) scale(-1, -1)" stroke="var(--accent)" stroke-width="1.5">
                        <path d="M 0 50 Q 0 0 50 0 Q 30 15 15 30 Q 0 50 0 50" fill="none" stroke-linecap="round"/>
                        <circle cx="15" cy="15" r="2" fill="var(--accent)"/>
                    </g>
                </svg>

                <div class="bg-script">Always Love</div>

                <div class="editor-area" id="editor" contenteditable="true">
                    <div class="invite-intro">You're Invited To</div>
                    <div class="invite-names">Hyesung & Arin</div>
                    <div class="invite-datetime">
                        DECEMBER 4, 2030<br>
                        <span style="font-size: 0.85em; opacity: 0.8;">2:00 PM IN THE AFTERNOON</span>
                    </div>
                    <div class="invite-location">
                        ARCH Sky Lounge<br>
                        Astra Hall, Top Floor
                    </div>
                    <div class="invite-outro">
                        Please join us as we become each other's only coordinate.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-ui" id="bottom-ui" data-html2canvas-ignore="true">
        <button class="theme-btn" onclick="changeTheme('theme-classic')">Classic</button>
        <span class="divider" style="height: 10px;"></span>
        <button class="theme-btn" onclick="changeTheme('theme-blossom')">Blossom</button>
        <span class="divider" style="height: 10px;"></span>
        <button class="theme-btn" onclick="changeTheme('theme-night')">Night</button>
    </div>

    <script>
        // 파티클 이펙트 (기존과 동일)
        setInterval(() => {
            const petal = document.createElement("div");
            petal.className = "petal";
            petal.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(petal);
            requestAnimationFrame(() => {
                petal.style.transition = "transform 12s linear, opacity 3s ease-in";
                petal.style.opacity = Math.random() * 0.4 + 0.1; 
                petal.style.transform = `translate(${(Math.random() - 0.5) * 150}px, 110vh) scale(${Math.random() * 0.5 + 0.5})`;
            });
            setTimeout(() => petal.remove(), 12000);
        }, 600);

        // 마우스 인터랙션 (기존과 동일)
        document.addEventListener("mousemove", e => {
            const card = document.getElementById("invite-card");
            const x = (e.clientX / window.innerWidth - 0.5) * 8; 
            const y = (e.clientY / window.innerHeight - 0.5) * 8;
            card.style.transform = `rotateX(${-y}deg) rotateY(${x}deg)`;
        });

        function changeFont(fontFamily) { document.execCommand('fontName', false, fontFamily); }
        function formatText(command, value = null) { document.execCommand(command, false, value); }

        function changeTheme(themeName) {
            document.body.className = themeName;
            const names = document.querySelector('.invite-names');
            if(names) {
                if(themeName === 'theme-night') names.style.color = '#c9d1d9';
                else if(themeName === 'theme-blossom') names.style.color = '#5a3c43';
                else names.style.color = '#4a433b';
            }
        }

        let uiVisible = true;
        function toggleUI() {
            const toolbar = document.getElementById('main-toolbar');
            const bottomUi = document.getElementById('bottom-ui');
            const btn = document.getElementById('toggle-ui-btn');
            uiVisible = !uiVisible;
            toolbar.style.opacity = uiVisible ? '1' : '0';
            toolbar.style.pointerEvents = uiVisible ? 'auto' : 'none';
            bottomUi.style.display = uiVisible ? 'flex' : 'none';
            btn.innerText = uiVisible ? 'Hide UI' : 'Show UI';
        }

        // ✅ html2canvas 테두리 저장 버그를 수정한 로직
        function saveImage() {
            const node = document.getElementById('invite-card');
            const wrapper = document.getElementById('card-wrapper');
            const editor = document.getElementById('editor');
            
            // 1. 캡처 버그 방지를 위해 모든 3D/애니메이션 강제 초기화
            const originalTransform = node.style.transform;
            const originalAnimation = wrapper.style.animation;
            node.style.transform = 'none';
            wrapper.style.animation = 'none';
            
            // 글씨 투명화 방지
            editor.style.opacity = '1';
            editor.setAttribute('contenteditable', 'false');

            // 2. 폰트 로딩 대기 후 캡처
            document.fonts.ready.then(() => {
                html2canvas(node, {
                    scale: 3,            
                    useCORS: true,      
                    backgroundColor: null,
                    // 테마 변수 유지를 위한 코드
                    onclone: (clonedDoc) => {
                        clonedDoc.body.className = document.body.className;
                        // 복제된 DOM에서는 transform을 확실히 꺼줌
                        const clonedCard = clonedDoc.getElementById('invite-card');
                        clonedCard.style.transform = 'none';
                    }
                }).then(canvas => {
                    // 원래 상태로 복구
                    node.style.transform = originalTransform;
                    wrapper.style.animation = originalAnimation;
                    editor.setAttribute('contenteditable', 'true');

                    // 다운로드
                    const link = document.createElement('a');
                    link.download = 'wedding_invitation.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }).catch(err => {
                    // 에러 시 상태 복구
                    node.style.transform = originalTransform;
                    wrapper.style.animation = originalAnimation;
                    editor.setAttribute('contenteditable', 'true');
                });
            });
        }
    </script>
</body>
</html>
